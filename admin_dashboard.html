<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lavu - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Login Screen */
        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-card h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }

        .login-card p {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        /* Dashboard */
        .dashboard-container {
            display: none;
            min-height: 100vh;
            background: #f5f5f5;
        }

        .dashboard-header {
            background: white;
            padding: 20px 30px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .dashboard-header h1 {
            font-size: 24px;
            color: #333;
        }

        .logout-btn {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #ff5252;
        }

        .dashboard-content {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #ddd;
        }

        .tab-button {
            padding: 12px 24px;
            background: transparent;
            border: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.3s;
        }

        .tab-button.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab-button:hover {
            color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Orders Section */
        .orders-grid {
            display: grid;
            gap: 20px;
        }

        .order-card {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #667eea;
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .order-id {
            font-weight: 700;
            font-size: 16px;
            color: #333;
        }

        .order-status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending {
            background: #fef3cd;
            color: #856404;
        }

        .status-picked_up {
            background: #d1ecf1;
            color: #0c5460;
        }

        .status-in_transit {
            background: #cce5ff;
            color: #004085;
        }

        .status-delivered {
            background: #d4edda;
            color: #155724;
        }

        .order-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }

        .detail-row {
            display: flex;
            flex-direction: column;
        }

        .detail-label {
            color: #666;
            font-weight: 600;
            margin-bottom: 4px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .detail-value {
            color: #333;
            font-size: 14px;
        }

        .status-update {
            display: flex;
            gap: 10px;
            align-items: end;
        }

        .status-update select {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }

        .update-btn {
            padding: 8px 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s;
        }

        .update-btn:hover {
            background: #5568d3;
        }

        .update-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* Analytics Section */
        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
        }

        .subscriber-table {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        }

        .table-header {
            background: #f8f9fa;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr 1fr 1fr;
            gap: 10px;
            font-weight: 600;
            font-size: 13px;
            text-transform: uppercase;
            color: #666;
        }

        .table-row {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr 1fr 1fr;
            gap: 10px;
            align-items: center;
            font-size: 14px;
        }

        .table-row:last-child {
            border-bottom: none;
        }

        .table-row:hover {
            background: #f9f9f9;
        }

        .usage-bar {
            background: #eee;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 4px;
        }

        .usage-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }

        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        @media (max-width: 768px) {
            .order-details {
                grid-template-columns: 1fr;
            }

            .table-header,
            .table-row {
                grid-template-columns: 1fr;
            }

            .analytics-grid {
                grid-template-columns: 1fr;
            }

            .dashboard-header {
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }

            .status-update {
                flex-direction: column;
            }
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
    </style>
</head>

<body>
    <!-- Login Screen -->
    <div id="loginContainer" class="login-container">
        <div class="login-card">
            <h1>🧺 Lavu Admin</h1>
            <p>Manage orders and view analytics</p>
            <div id="errorMessage" class="error-message"></div>
            <div class="form-group">
                <label for="adminPassword">Admin Password</label>
                <input type="password" id="adminPassword" placeholder="Enter admin password" />
            </div>
            <button class="login-btn" onclick="handleLogin()">Login</button>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboardContainer" class="dashboard-container">
        <div class="dashboard-header">
            <h1>🧺 Lavu Admin Dashboard</h1>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>

        <div class="dashboard-content">
            <!-- Success Message -->
            <div id="successMessage" class="success-message"></div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-button active" onclick="switchTab('orders')">📦 Orders</button>
                <button class="tab-button" onclick="switchTab('analytics')">📊 Analytics</button>
            </div>

            <!-- Orders Tab -->
            <div id="ordersTab" class="tab-content active">
                <div id="ordersContent"></div>
            </div>

            <!-- Analytics Tab -->
            <div id="analyticsTab" class="tab-content">
                <div id="analyticsContent"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:8000'; // Update with your backend URL
        const ADMIN_PASSWORD = 'lavu_admin_2024'; // Simple auth - use proper JWT in production

        let isAuthenticated = false;

        // ============ LOGIN LOGIC ============
        function handleLogin() {
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('errorMessage');

            if (!password) {
                errorDiv.textContent = 'Please enter a password';
                errorDiv.style.display = 'block';
                return;
            }

            // Simple password check (replace with JWT in production)
            if (password === ADMIN_PASSWORD) {
                isAuthenticated = true;
                localStorage.setItem('adminAuth', 'true');
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'flex';
                document.getElementById('dashboardContainer').style.flexDirection = 'column';
                errorDiv.style.display = 'none';
                loadOrders();
            } else {
                errorDiv.textContent = 'Invalid password';
                errorDiv.style.display = 'block';
            }
        }

        function handleLogout() {
            isAuthenticated = false;
            localStorage.removeItem('adminAuth');
            document.getElementById('loginContainer').style.display = 'flex';
            document.getElementById('dashboardContainer').style.display = 'none';
            document.getElementById('adminPassword').value = '';
        }

        // Check if already authenticated
        window.addEventListener('load', () => {
            if (localStorage.getItem('adminAuth') === 'true') {
                isAuthenticated = true;
                document.getElementById('loginContainer').style.display = 'none';
                document.getElementById('dashboardContainer').style.display = 'flex';
                document.getElementById('dashboardContainer').style.flexDirection = 'column';
                loadOrders();
            }
        });

        // ============ TAB SWITCHING ============
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-button').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName + 'Tab').classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'orders') {
                loadOrders();
            } else if (tabName === 'analytics') {
                loadAnalytics();
            }
        }

        // ============ LOAD ORDERS ============
        async function loadOrders() {
            const content = document.getElementById('ordersContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading orders...</p></div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/orders`);
                if (!response.ok) throw new Error('Failed to fetch orders');

                const orders = await response.json();

                if (orders.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📭</div>
                            <h3>No active orders</h3>
                            <p>All orders have been delivered!</p>
                        </div>
                    `;
                    return;
                }

                let ordersHTML = '<div class="orders-grid">';
                orders.forEach(order => {
                    ordersHTML += renderOrderCard(order);
                });
                ordersHTML += '</div>';

                content.innerHTML = ordersHTML;
            } catch (error) {
                console.error('Error:', error);
                content.innerHTML = `
                    <div class="error-message" style="display: block;">
                        <strong>Error:</strong> Failed to load orders. Make sure the backend is running at ${API_BASE_URL}
                    </div>
                `;
            }
        }

        function renderOrderCard(order) {
            const statuses = ['PENDING', 'PICKED_UP', 'IN_TRANSIT', 'DELIVERED'];
            const statusOptions = statuses.map(s =>
                `<option value="${s}" ${order.status === s ? 'selected' : ''}>${s}</option>`
            ).join('');

            const pickupDate = new Date(order.scheduled_pickup).toLocaleDateString('en-KE', {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            return `
                <div class="order-card">
                    <div class="order-header">
                        <div>
                            <div class="order-id">Order #${order.id}</div>
                            <div style="font-size: 12px; color: #999; margin-top: 4px;">User ID: ${order.user_id}</div>
                        </div>
                        <span class="order-status status-${order.status.toLowerCase()}">${order.status}</span>
                    </div>

                    <div class="order-details">
                        <div class="detail-row">
                            <span class="detail-label">Pickup Date</span>
                            <span class="detail-value">${pickupDate}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Weight</span>
                            <span class="detail-value">${order.kg_weight ? order.kg_weight + ' kg' : 'Not weighed'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Pickup Address</span>
                            <span class="detail-value">${order.pickup_address}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">Delivery Address</span>
                            <span class="detail-value">${order.delivery_address}</span>
                        </div>
                    </div>

                    <div style="margin-bottom: 15px;">
                        <div class="detail-label">Notes</div>
                        <div class="detail-value">${order.notes || 'No notes'}</div>
                    </div>

                    <div class="status-update">
                        <select onchange="updateOrderStatus(${order.id}, this.value)">
                            ${statusOptions}
                        </select>
                    </div>
                </div>
            `;
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/orders/${orderId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus })
                });

                if (!response.ok) throw new Error('Failed to update order');

                // Show success message
                const successDiv = document.getElementById('successMessage');
                successDiv.textContent = `Order #${orderId} status updated to ${newStatus}`;
                successDiv.style.display = 'block';
                setTimeout(() => {
                    successDiv.style.display = 'none';
                }, 3000);

                loadOrders();
            } catch (error) {
                alert('Error updating order: ' + error.message);
                loadOrders();
            }
        }

        // ============ LOAD ANALYTICS ============
        async function loadAnalytics() {
            const content = document.getElementById('analyticsContent');
            content.innerHTML = '<div class="loading"><div class="spinner"></div><p>Loading analytics...</p></div>';

            try {
                const response = await fetch(`${API_BASE_URL}/api/admin/analytics`);
                if (!response.ok) throw new Error('Failed to fetch analytics');

                const data = await response.json();

                if (!data || data.length === 0) {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📊</div>
                            <h3>No subscriber data</h3>
                            <p>No active subscriptions found.</p>
                        </div>
                    `;
                    return;
                }

                // Calculate stats
                const totalSubscribers = data.length;
                const totalKgUsed = data.reduce((sum, s) => sum + s.kg_used_this_month, 0);
                const totalKgAllowed = data.reduce((sum, s) => sum + s.kg_limit, 0);
                const avgUsagePercent = data.reduce((sum, s) => sum + s.usage_percent, 0) / data.length;

                let analyticsHTML = `
                    <div class="analytics-grid">
                        <div class="stat-card">
                            <div class="stat-label">Active Subscribers</div>
                            <div class="stat-value">${totalSubscribers}</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);">
                            <div class="stat-label">Total KG Used This Month</div>
                            <div class="stat-value">${totalKgUsed.toFixed(1)} kg</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);">
                            <div class="stat-label">Total KG Allowed</div>
                            <div class="stat-value">${totalKgAllowed.toFixed(1)} kg</div>
                        </div>
                        <div class="stat-card" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);">
                            <div class="stat-label">Avg Usage</div>
                            <div class="stat-value">${avgUsagePercent.toFixed(1)}%</div>
                        </div>
                    </div>

                    <h3 style="margin-top: 30px; margin-bottom: 15px; color: #333; font-size: 18px;">📋 Subscriber Details</h3>
                    <div class="subscriber-table">
                        <div class="table-header">
                            <div>Customer Name</div>
                            <div>Phone Number</div>
                            <div>Plan Tier</div>
                            <div>KG Usage</div>
                            <div>Usage %</div>
                        </div>
                `;

                data.forEach(subscriber => {
                    analyticsHTML += `
                        <div class="table-row">
                            <div>${subscriber.full_name}</div>
                            <div>${subscriber.phone_number}</div>
                            <div><strong>${subscriber.plan_tier}</strong></div>
                            <div>${subscriber.kg_used_this_month.toFixed(1)} / ${subscriber.kg_limit} kg</div>
                            <div>
                                <div style="font-weight: 600; color: ${subscriber.usage_percent > 80 ? '#ff6b6b' : '#667eea'};">
                                    ${subscriber.usage_percent.toFixed(1)}%
                                </div>
                                <div class="usage-bar">
                                    <div class="usage-fill" style="width: ${Math.min(subscriber.usage_percent, 100)}%"></div>
                                </div>
                            </div>
                        </div>
                    `;
                });

                analyticsHTML += '</div>';
                content.innerHTML = analyticsHTML;
            } catch (error) {
                console.error('Error:', error);
                content.innerHTML = `
                    <div class="error-message" style="display: block;">
                        <strong>Error:</strong> Failed to load analytics. Make sure the backend is running at ${API_BASE_URL}
                    </div>
                `;
            }
        }
    </script>
</body>

</html>
